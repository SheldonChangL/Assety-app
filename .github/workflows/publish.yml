name: Publish to Google Play

# Triggers when a commit is pushed to the `release` branch.
# The typical workflow is: develop on `main` → merge PR into `release` → this job fires.
on:
  push:
    branches:
      - release
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  publish:
    name: Build & publish AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (full history so we can read commit log) ────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ── 3. Gradle wrapper permissions ──────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # ── 4. Restore signing keystore from secret ─────────────────────────────
      - name: Decode release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      # ── 5. Write local.properties with signing credentials ─────────────────
      - name: Write signing credentials to local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties
          echo "signing.storeFile=release.keystore" >> local.properties
          echo "signing.storePassword=${{ secrets.SIGNING_STORE_PASSWORD }}" >> local.properties
          echo "signing.keyAlias=${{ secrets.SIGNING_KEY_ALIAS }}" >> local.properties
          echo "signing.keyPassword=${{ secrets.SIGNING_KEY_PASSWORD }}" >> local.properties

      # ── 6. Auto-generate What's New from git log ────────────────────────────
      # Uses commits since the previous release tag (git tag v*).
      # Falls back to the last 10 commits if no tag exists yet.
      # Play Store limit is 500 characters per locale.
      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -E '^v[0-9]' | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD~10..HEAD"
          fi

          # Build a bullet list from commit subject lines, skip merge commits and ci: commits
          NOTES=$(git log "$RANGE" --pretty=format:"• %s" --no-merges \
            | grep -v "^• ci:" \
            | head -n 20 \
            | cut -c1-500)

          if [ -z "$NOTES" ]; then
            NOTES="• Bug fixes and improvements."
          fi

          mkdir -p fastlane/metadata/android/en-US/changelogs
          mkdir -p fastlane/metadata/android/zh-TW/changelogs
          echo "$NOTES" > fastlane/metadata/android/en-US/changelogs/default.txt
          echo "$NOTES" > fastlane/metadata/android/zh-TW/changelogs/default.txt
          echo "--- Release notes ---"
          cat fastlane/metadata/android/en-US/changelogs/default.txt

      # ── 7. Build signed release AAB ─────────────────────────────────────────
      - name: Build release AAB
        env:
          VERSION_CODE_OFFSET: ${{ vars.VERSION_CODE_OFFSET || '0' }}
        run: |
          OFFSET=${VERSION_CODE_OFFSET:-0}
          ./gradlew bundleRelease \
            -PVERSION_CODE=$(( ${{ github.run_number }} + OFFSET )) \
            --no-daemon

      # ── 8. Upload AAB to Google Play ────────────────────────────────────────
      - name: Upload to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: chang.sllj.homeassetkeeper
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          inAppUpdatePriority: 2
          whatsNewDirectory: fastlane/metadata/android
